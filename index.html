<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>EcoWrap – Eco-Friendly Packaging</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
 <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
 <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
<style>
 :root {
      --green:   #2d6a4f;
      --light:   #d8f3dc;
      --accent:  #74c69d;
      --dark:    #1b4332;
      --text:    #222;
      --bg:      #f8fdf9;
    }
       * { box-sizing: border-box; margin: 0; padding: 0; }
       body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
    h1, h2, h3 { font-family: 'Playfair Display', serif; }
     /* ── Navbar ── */
    .navbar { background: var(--dark); }
    .navbar-brand { color: var(--accent) !important; font-family: 'Playfair Display', serif; font-size: 1.5rem; }
    .nav-link { color: #ccc !important; transition: color .2s; }
     .nav-link:hover { color: var(--accent) !important; }

      /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, var(--dark) 0%, var(--green) 100%);
      color: #fff;
      padding: 110px 0 80px;
      text-align: center;
    }

         .hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); }
    .hero p  { font-size: 1.1rem; opacity: .85; max-width: 550px; margin: 1rem auto 2rem; }

       .btn-eco { background: var(--accent); color: var(--dark); font-weight: 600; border: none; padding: .7rem 2rem; border-radius: 50px; }
    .btn-eco:hover { background: #fff; color: var(--dark); }
</style>
</head>
<body>
    
</body>
</html>
